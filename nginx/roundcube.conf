upstream roundcube_backend {
    server roundcubemail:80;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    client_max_body_size 25M;

    location ~* \.(css|js|woff2|svg|png|jpg|jpeg|gif|ico)$ {
        proxy_pass http://roundcube_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://roundcube_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }
}
