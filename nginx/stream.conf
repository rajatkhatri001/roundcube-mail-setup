worker_processes auto;

events {
    worker_connections 1024;
}

stream {
    # IMAP proxy to Hostinger with TLS session reuse
    server {
        listen 9993;
        proxy_pass imap.hostinger.com:993;
        proxy_ssl on;
        proxy_ssl_session_reuse on;
        proxy_connect_timeout 5s;
        proxy_timeout 300s;
    }

    # SMTP proxy to Hostinger with TLS session reuse
    server {
        listen 9465;
        proxy_pass smtp.hostinger.com:465;
        proxy_ssl on;
        proxy_ssl_session_reuse on;
        proxy_connect_timeout 5s;
        proxy_timeout 300s;
    }
}
