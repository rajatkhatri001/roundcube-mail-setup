services:
  roundcubemail:
    image: roundcube/roundcubemail:latest
    container_name: roundcube
    restart: always
    ports:
      - "8080:80"
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=tls://dovecot:143
      - ROUNDCUBEMAIL_DEFAULT_PORT=143
      - ROUNDCUBEMAIL_SMTP_SERVER=ssl://smtp.hostinger.com
      - ROUNDCUBEMAIL_SMTP_PORT=465
      - ROUNDCUBEMAIL_DB_TYPE=mysql
      - ROUNDCUBEMAIL_DB_HOST=roundcubemail-mysql
      - ROUNDCUBEMAIL_DB_USER=roundcube
      - ROUNDCUBEMAIL_DB_PASSWORD=123
      - ROUNDCUBEMAIL_DB_NAME=roundcubemail
      - ROUNDCUBEMAIL_PLUGINS=archive,zipdownload,newmail_notifier,ident_switch
      - ROUNDCUBEMAIL_COMPOSER_PLUGINS=gecka/ident-switch
    volumes:
      - ./www:/var/www/html
    depends_on:
      - roundcubemail-mysql
      - dovecot

  roundcubemail-mysql:
    image: mariadb:11
    container_name: roundcube-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=123
      - MYSQL_DATABASE=roundcubemail
      - MYSQL_USER=roundcube
      - MYSQL_PASSWORD=123
    volumes:
      - rc_db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: roundcube-redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  dovecot:
    image: dovecot/dovecot:2.3-latest
    container_name: local-dovecot
    restart: always
    volumes:
      - ./dovecot/conf:/etc/dovecot
      - ./mail-mirror/maildir:/var/mail
    depends_on:
      - roundcubemail-mysql

  sync-daemon:
    build: ./sync-daemon
    container_name: mail-sync-daemon
    restart: always
    volumes:
      - ./mail-mirror/maildir:/var/mail
    depends_on:
      - roundcubemail-mysql
      - dovecot

  account-manager:
    build: ./account-manager
    container_name: account-manager
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - roundcubemail-mysql

  monitor:
    build: ./monitor
    container_name: email-monitor
    restart: always
    ports:
      - "5001:5001"
    depends_on:
      - roundcubemail-mysql

volumes:
  rc_db_data:
