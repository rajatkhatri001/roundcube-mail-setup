services:
  roundcubemail:
    image: roundcube/roundcubemail:latest
    container_name: roundcube
    restart: always
    expose:
      - "80"
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=tls://mailproxy:9993
      - ROUNDCUBEMAIL_DEFAULT_PORT=9993
      - ROUNDCUBEMAIL_SMTP_SERVER=tls://mailproxy:9465
      - ROUNDCUBEMAIL_SMTP_PORT=9465
      - ROUNDCUBEMAIL_DB_TYPE=mysql
      - ROUNDCUBEMAIL_DB_HOST=roundcubemail-mysql
      - ROUNDCUBEMAIL_DB_USER=roundcube
      - ROUNDCUBEMAIL_DB_PASSWORD=123
      - ROUNDCUBEMAIL_DB_NAME=roundcubemail
      - ROUNDCUBEMAIL_PLUGINS=archive,zipdownload,newmail_notifier,ident_switch
      - ROUNDCUBEMAIL_COMPOSER_PLUGINS=gecka/ident-switch
    volumes:
      - ./www:/var/www/html
    depends_on:
      - roundcubemail-mysql

  roundcubemail-mysql:
    image: mariadb:11
    container_name: roundcube-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=123
      - MYSQL_DATABASE=roundcubemail
      - MYSQL_USER=roundcube
      - MYSQL_PASSWORD=123
    volumes:
      - rc_db_data:/var/lib/mysql

  nginx:
    image: nginx:alpine
    container_name: roundcube-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/roundcube.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - roundcubemail

  mailproxy:
    image: nginx:alpine
    container_name: roundcube-mailproxy
    restart: always
    volumes:
      - ./nginx/stream.conf:/etc/nginx/nginx.conf:ro
  dovecot:
    image: dovecot/dovecot:latest
    container_name: local-dovecot
    restart: always
    volumes:
      - ./dovecot/conf:/etc/dovecot
      - ./dovecot/mail:/var/mail
    ports:
      - "1430:143"
      - "9930:993"

volumes:
  rc_db_data:
